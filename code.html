<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Turret+Road:wght@200;300;400;500;700;800&display=swap');
@import url('https://fonts.googleapis.com/css?family=Press+Start+2P&display=swap');

:root {
    --pry-Color: #FFD350;
    --pry-ff: 'Press Start 2P';
    --sec-ff: 'Turret Road'
}


* {
    padding: 0px;
    margin: 0px;
    box-sizing: border-box;
}

body {
    font-family: 'Turret Road', sans-serif;
    position: relative;
}

header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px;
    height: 90px;
    padding: 50px;
    position: relative;
    /* background-color: red; */
}

header .left {
    display: flex;
    align-items: center;
}

header .left button {
    margin-right: 16px;
    border: none;
    background-color: var(--pry-Color);
    font-family: "Press Start 2P";
    font-size: 16px;
    cursor: pointer;
    padding: 18px 14px;
    border-radius: 1px;
}

header .left img {
    width: 64px;
    cursor: pointer;
}

header .right img {
    width: 82px;
    cursor: pointer;
}

.container {
    width: 100%;
    display: flex;
    justify-content: center;
    flex-direction: column;
    /* position: relative; */
}

.line {
    height: 5px;
    margin-top: 6%;
    /* display: block; */
    /* color: var(--pry-Color); */
    background: var(--pry-Color);
    border: none;
}

.result {
    text-align: center;
    font-size: 2rem;
    /* display: inline; */
    margin: 0px auto;
    /* width: 22px; */
    padding: 2rem 4rem;
    /* z-index: 2; */
    position: relative;
    bottom: 3.5rem;
    border: 5px solid var(--pry-Color);
    border-radius: 4px;
    background-color: #fff;
    font-family: var(--pry-ff);
    /* font-weight: bold; */
    /* font-size: 24px; */
}

.ContainerRecords {
    display: flex;
    justify-content: space-between;
}

.ContainerRecords .left {

    /* background-color: red; */
    width: 100%;
}

.ContainerRecords form {
    /* margin-left: 9rem; */
    display: flex;
    flex-direction: column;
    align-items: center;
}

.ContainerRecords .left input {
    border: 5px solid var(--pry-Color);
    border-radius: 4px;
    padding: 30px 5px;
    outline: none;
    font-family: var(--sec-ff);
    font-weight: bold;
    font-size: 20px;
    width: 30%;
    text-align: center;
    /* color: red; */
    /* font-family: "Press Start 2P"; */
}

/* .ContainerRecords .left input:focus{
    border: none;
} */
.ContainerRecords .left button {
    border: none;
    background-color: var(--pry-Color);
    font-family: var(--sec-ff);
    /* width: 5rem; */
    margin: 16px;
    font-size: 16px;
    cursor: pointer;
    padding: 1.5rem 14px;
    border-radius: 1px;
    font-weight: 500;
    font-size: 22px;
    width: 20%;
}

.ContainerRecords .right {
    /* margin-right: 80%; */
    /* background-color: red; */
    width: 100%;
    display: flex;
    /* align-items: center; */
    margin: 10px 30px;
    flex-direction: column;
    justify-content: center;
}

.ContainerRecords .right p {
    padding: 10px 40px;
    margin-bottom: 20px;
    font-family: var(--pry-ff);
    color: var(--pry-Color);
}

.ContainerRecords .right .group {
    /* margin-bottom: 4rem; */
    font-size: 24px;
}

.ContainerRecords .right .value {
    font-size: 18px;
    /* padding-bottom: 20px; */
    margin-top: 18px;
}

footer {
    /* background: #000; */
    /* height: 90px; */
    width: 100%;
    margin-top: 30px;
    font-family: var(--pry-ff);
    text-align: center;

}

footer .line {
    margin-bottom: 1px;
    margin-top: 0px;
    border: 4px dashed;
    border-radius: 50%;
    /* background-color: red; */
    /* color: green; */
    background: none;
    color: var(--pry-Color);
    /* padding: 30px; */
}

footer p {
    padding-top: 15px;
}

.modalBox {
    width: 400px;
    /* height: 650px; */
    height: 37.8rem;
    background-color: #D9D9D9;
    position: absolute;
    right: 20px;
    top: 14px;
    display: block;
border-radius: 30px;
    box-shadow: -19px 0px 29px 1px rgba(0, 0, 0, 0.36);
    -webkit-box-shadow: -19px 0px 29px 1px rgba(0, 0, 0, 0.36);
}


.modalBox form {
    display: flex;
    flex-direction: column;
    font-family: var(--pry-ff);
    justify-content: right;
    margin-top: 5rem;

    /* width: 30%; */
}

.modalBox form input {
    width: 60%;
    /* margin: 10px; */
    background-color: #D0CCCC;
    border: 2px solid #000;
    border-radius: 18px;
    padding: 18px 36px;
    color: #000;
    font-size: 20px;
    font-family: var(--sec-ff);
    font-weight: bold;
}

.modalBox form input::placeholder {
    color: #000;
}

.modalBox form input:first-child {
    /* display: flex; */
    /* background-color: red; */
    margin-left: 1rem;
    /* align-items: flex-end; */


}

.modalBox form input:nth-child(even) {
    margin-top: 2rem;
    margin-left: 9rem;
    /* background-color: red; */
}

.modalBox form button {
    cursor: pointer;
    width: 9rem;
    padding: 16px 24px;
    font-size: 18px;
    font-family: var(--sec-ff);
    background-color: #D0CCCC;
    border: 2px solid #000;
    border-radius: 18px;
    color: #000;
    font-size: 20px;
    /* font-family: var(--sec-ff); */
    font-weight: bold;
    text-align: center;
    margin: 4rem auto;
}

.none {
    display: none;
}
.warning{
    color: rgb(187, 32, 32);
    font-size: 20px;
       text-align: center;
    /* font-family: var(--sec-ff); */
    /* font-family: var(--sec-ff); */
    font-family: var(--pry-ff);
    line-height: 180%;
 
}
</style>
  </head>
  <body>
    <header>
      <div class="left">
        <button type="button">Again!</button>
        <div><img src="./icons/Moon.png" alt="" /></div>
      </div>
      <div class="right">
        <img id="OPenModal" src="./icons/Settings.png" alt="" />
      </div>
    </header>
    <div class="container">
      <hr class="line" />
      <p class="result"></p>

      <div class="ContainerRecords">
        <div class="left">
          <form>
            <input type="number" id="guessPart" />
            <button id="StartRansom" type="button">go&#94;&#95;&#94;</button>
          </form>
        </div>
        <div class="right">
          <div class="group">
            <p><span>Step:</span></p>
            <p><span>Score:</span></p>
          </div>
          <p class="value"></p>
        </div>
      </div>
    </div>

    <footer>
      <hr class="line" />
      <p>made by me!!!</p>
    </footer>
    <div class="none" id="modalBox">
      <form>
        <input id="minNumber" type="number" placeholder="min number" />
        <input id="maxNumber" type="number" placeholder="max number" />
        <button type="button" id="SaveValue">Save</button>
      </form>
    </div>
    <script>
      const minNumber = document.getElementById("minNumber");
      const maxNumber = document.getElementById("maxNumber");

      const SaveValue = document.getElementById("SaveValue");
      const ModalBox = document.getElementById("modalBox");
      const OPenModal = document.getElementById("OPenModal");
      const StartRansom = document.getElementById("StartRansom");
      const guessPart = document.getElementById("guessPart");
      const paraVal = document.querySelector(".value");
      const warning = document.createElement("p");
      ModalBox.appendChild(warning);

      const result = document.querySelector(".result");

      OPenModal.addEventListener("click", () => {
        ModalBox.classList.remove("none");
        ModalBox.classList.add("modalBox");
      });

      SaveValue.addEventListener("click", () => {
        let minNumberVal = +minNumber.value;
        let maxNumberVal = +maxNumber.value;

        if (minNumberVal >= maxNumberVal) {
          // alert('max must be bigger than min...')
          warning.innerHTML = "";
          // console.log('bloom1');
          warning.classList.remove("none");
          warning.classList.add("warning");
          warning.append("MAX must be more than MIN!!!");
        } else if (maxNumberVal > minNumberVal) {
          // console.log('bloom2');
          paraVal.textContent = `numbers are between ${minNumberVal} - ${maxNumberVal}`;
          ModalBox.classList.remove("modalBox");
          ModalBox.classList.add("none");

          warning.classList.remove("warning");
          warning.classList.add("none");
        }

        // minNumber.value=
        // maxNumber.value=
      });
      StartRansom.addEventListener("click", () => {
        // result.innerHTML=' '
        let maxInput = +maxNumber.value;
        let minInput = +minNumber.value;
        let GuessNumb = +guessPart.value;
        // let minInputNumber= +minInput
        // console.log('MIN=' + minInput);
        // console.log('MAX= ' + maxInput);
        // console.log(minInputNumber);

        let randomNumber = randomNum(minInput, maxInput);
        let notran = randomNumber;
        console.log(randomNumber);
        console.log(notran);

        // result.append(randomNumber)
        if (GuessNumb === randomNumber) console.log("so>");
      });

      function randomNum(minNumber, maxNumber) {
        let random =
          Math.floor(Math.random() * (maxNumber - minNumber)) + minNumber;
        console.log(random);
        return random;
      }
    </script>
  </body>
</html>
